name: Daily monitoring digest

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC every day
  workflow_dispatch:        # Allow manual trigger from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger monitoring digest endpoint
        run: |
          response=$(curl -s -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ secrets.NEXT_PUBLIC_SITE_URL }}/api/cron/monitoring-digest)

          echo "HTTP status: $response"
          echo "Response body:"
          cat response.json

          if [ "$response" != "200" ]; then
            echo "Monitoring digest failed with HTTP status $response"
            exit 1
          fi

          overall=$(cat response.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('overall', 'unknown'))")
          attention=$(cat response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('attentionItems', [])))")
          echo "Digest sent successfully - overall: $overall, attention items: $attention"
