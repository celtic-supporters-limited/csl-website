<svg viewBox="0 0 860 1540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <title>CSL Member Migration — Process Flow v3</title>
  <desc>Seven-phase migration from WordPress (Paid Member Subscriptions Pro) to Stripe Subscriptions and Supabase Auth, with strict sequencing to prevent double-charging.</desc>

  <defs>
    <marker id="arr"     markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#6b7280"/></marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#1b4d2e"/></marker>
    <marker id="arr-amb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#d97706"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#dc2626"/></marker>
  </defs>

  <rect width="860" height="1540" fill="#ffffff"/>

  <!-- Title -->
  <rect x="0" y="0" width="860" height="56" fill="#1b4d2e"/>
  <text x="430" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="Georgia, serif">CSL Member Migration — Process Flow</text>
  <text x="430" y="44" text-anchor="middle" font-size="11" fill="#86efac">WordPress (PMS Pro) → Stripe Subscriptions + Supabase Auth</text>

  <!-- Column headers -->
  <rect x="16"  y="64" width="190" height="28" rx="4" fill="#fef2f2"/>
  <rect x="220" y="64" width="210" height="28" rx="4" fill="#eff6ff"/>
  <rect x="444" y="64" width="200" height="28" rx="4" fill="#f0fdf4"/>
  <rect x="658" y="64" width="186" height="28" rx="4" fill="#fafaf9"/>
  <text x="111" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">WordPress / PMS Pro</text>
  <text x="325" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Stripe</text>
  <text x="544" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Supabase</text>
  <text x="751" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Member</text>

  <!-- PHASE 1 -->
  <rect x="16" y="100" width="828" height="20" rx="3" fill="#f3f4f6"/>
  <text x="430" y="114" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.2">PHASE 1 — PREPARE</text>

  <rect x="16" y="128" width="190" height="48" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="111" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">PMS Pro billing active</text>
  <text x="111" y="165" text-anchor="middle" font-size="10" fill="#b91c1c">WP-Cron charging as normal</text>

  <rect x="16" y="196" width="190" height="48" rx="5" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="111" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Export member data</text>
  <text x="111" y="233" text-anchor="middle" font-size="10" fill="#6b7280">seed.csv (493 active members)</text>

  <line x1="111" y1="176" x2="111" y2="196" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="206" y1="220" x2="220" y2="220" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <rect x="220" y="196" width="210" height="48" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="325" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Sandbox rehearsal first</text>
  <text x="325" y="230" text-anchor="middle" font-size="10" fill="#3b82f6">seed-sandbox.ts mirrors production</text>
  <text x="325" y="244" text-anchor="middle" font-size="10" fill="#3b82f6">full pipeline verified before live run</text>

  <!-- PHASE 2 -->
  <rect x="16" y="262" width="828" height="20" rx="3" fill="#f3f4f6"/>
  <text x="430" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.2">PHASE 2 — CREATE STRIPE SUBSCRIPTIONS (one-shot)</text>

  <line x1="325" y1="244" x2="325" y2="292" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="292" width="210" height="48" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="325" y="313" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">create-subscriptions.ts</text>
  <text x="325" y="329" text-anchor="middle" font-size="10" fill="#3b82f6">--execute flag to run</text>

  <rect x="444" y="292" width="200" height="62" rx="5" fill="#fafaf9" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="544" y="313" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Live card check</text>
  <text x="544" y="329" text-anchor="middle" font-size="10" fill="#6b7280">stripe.paymentMethods.retrieve()</text>
  <text x="544" y="345" text-anchor="middle" font-size="10" fill="#6b7280">brand · last4 · expiry logged</text>
  <text x="544" y="359" text-anchor="middle" font-size="10" fill="#6b7280">for all rows — never from WP</text>
  <line x1="430" y1="318" x2="444" y2="318" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <line x1="325" y1="340" x2="325" y2="358" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="358" width="424" height="72" rx="5" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="432" y="378" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">NO DOUBLE-CHARGE GUARANTEE</text>
  <text x="432" y="396" text-anchor="middle" font-size="11" fill="#78350f">billing_cycle_anchor = member's existing PMS Pro renewal date</text>
  <text x="432" y="412" text-anchor="middle" font-size="11" fill="#78350f">Stripe creates subscription with no immediate invoice</text>
  <text x="432" y="428" text-anchor="middle" font-size="11" fill="#78350f">WP-Cron handles the final charge as normal</text>

  <line x1="325" y1="430" x2="325" y2="448" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-amb)"/>

  <rect x="220" y="448" width="210" height="48" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="325" y="469" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Subscription created</text>
  <text x="325" y="485" text-anchor="middle" font-size="10" fill="#1d4ed8">status=active · no invoice yet</text>

  <rect x="444" y="448" width="200" height="48" rx="5" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="544" y="466" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Expired card?</text>
  <text x="544" y="482" text-anchor="middle" font-size="10" fill="#9a3412">Created anyway — member</text>
  <text x="544" y="496" text-anchor="middle" font-size="10" fill="#9a3412">updates via portal on first login</text>
  <line x1="430" y1="472" x2="444" y2="472" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-amb)"/>

  <!-- PHASE 3 -->
  <rect x="16" y="514" width="828" height="20" rx="3" fill="#f3f4f6"/>
  <text x="430" y="528" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.2">PHASE 3 — SYNC MEMBERS TO SUPABASE</text>

  <line x1="325" y1="496" x2="325" y2="544" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="544" width="210" height="48" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="325" y="565" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">migrate-members.ts</text>
  <text x="325" y="581" text-anchor="middle" font-size="10" fill="#3b82f6">Reads Stripe → upserts members table</text>

  <line x1="430" y1="568" x2="444" y2="568" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="444" y="544" width="200" height="48" rx="5" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="544" y="565" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">members row created</text>
  <text x="544" y="581" text-anchor="middle" font-size="10" fill="#166534">status · plan_name · tier · amount</text>

  <!-- PHASE 4 -->
  <rect x="16" y="610" width="828" height="20" rx="3" fill="#f3f4f6"/>
  <text x="430" y="624" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.2">PHASE 4 — CREATE AUTH ACCOUNTS</text>

  <line x1="325" y1="592" x2="325" y2="640" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="544" y1="592" x2="544" y2="640" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="640" width="210" height="48" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="325" y="661" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">create-auth-users.ts</text>
  <text x="325" y="677" text-anchor="middle" font-size="10" fill="#3b82f6">--execute flag to run</text>

  <line x1="430" y1="664" x2="444" y2="664" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="444" y="640" width="200" height="62" rx="5" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="544" y="661" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">auth.users record created</text>
  <text x="544" y="677" text-anchor="middle" font-size="10" fill="#166534">email confirmed · no password</text>
  <text x="544" y="691" text-anchor="middle" font-size="10" fill="#166534">user_id linked to members row</text>

  <!-- PHASE 5 -->
  <rect x="16" y="720" width="828" height="20" rx="3" fill="#f3f4f6"/>
  <text x="430" y="734" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.2">PHASE 5 — CUTOVER (strict sequence)</text>

  <line x1="325" y1="702" x2="325" y2="758" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="750" width="210" height="48" rx="5" fill="#fffbeb" stroke="#fbbf24" stroke-width="2"/>
  <text x="325" y="771" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Verify Stripe + Supabase sync</text>
  <text x="325" y="787" text-anchor="middle" font-size="10" fill="#78350f">subscription active · member row present</text>

  <line x1="325" y1="798" x2="325" y2="818" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-amb)"/>
  <text x="338" y="812" font-size="10" font-style="italic" fill="#92400e">only after sync confirmed</text>

  <rect x="16" y="818" width="190" height="62" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="111" y="839" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">PMS Pro: Cancel subscription</text>
  <text x="111" y="855" text-anchor="middle" font-size="10" fill="#b91c1c">Status = Cancelled</text>
  <text x="111" y="869" text-anchor="middle" font-size="10" fill="#b91c1c">Expiry = member's next-payment date</text>
  <line x1="220" y1="849" x2="200" y2="849" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="444" y="818" width="200" height="48" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="544" y="839" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">New webhook endpoint live</text>
  <text x="544" y="855" text-anchor="middle" font-size="10" fill="#3b82f6">/api/webhooks/stripe registered</text>
  <line x1="544" y1="702" x2="544" y2="818" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PHASE 6 -->
  <rect x="16" y="898" width="828" height="20" rx="3" fill="#f3f4f6"/>
  <text x="430" y="912" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.2">PHASE 6 — FIRST MEMBER LOGIN</text>

  <line x1="751" y1="820" x2="751" y2="928" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="658" y="928" width="186" height="48" rx="5" fill="#fafaf9" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="751" y="949" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Member visits /login</text>
  <text x="751" y="965" text-anchor="middle" font-size="10" fill="#6b7280">directed by email announcement</text>

  <line x1="751" y1="976" x2="751" y2="996" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="751,996 820,1020 751,1044 682,1020" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="751" y="1016" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Password</text>
  <text x="751" y="1030" text-anchor="middle" font-size="10" fill="#92400e">set?</text>

  <line x1="682" y1="1020" x2="610" y2="1020" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="646" y="1012" text-anchor="middle" font-size="10" fill="#6b7280">NO</text>

  <rect x="444" y="996" width="162" height="48" rx="5" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="525" y="1017" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Forgot password</text>
  <text x="525" y="1033" text-anchor="middle" font-size="10" fill="#78350f">Supabase emails reset link</text>

  <line x1="525" y1="1044" x2="525" y2="1064" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="444" y="1064" width="162" height="48" rx="5" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="525" y="1085" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Set password</text>
  <text x="525" y="1101" text-anchor="middle" font-size="10" fill="#6b7280">/auth/update-password</text>

  <line x1="751" y1="1044" x2="751" y2="1130" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="763" y="1085" font-size="10" fill="#6b7280">YES</text>
  <text x="763" y="1098" font-size="10" fill="#6b7280">(subsequent</text>
  <text x="763" y="1111" font-size="10" fill="#6b7280">logins)</text>

  <line x1="525" y1="1112" x2="525" y2="1142" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="525" y1="1142" x2="640" y2="1142" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="640" y1="1142" x2="640" y2="1150" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="1130" width="570" height="56" rx="6" fill="#1b4d2e"/>
  <text x="505" y="1156" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="Georgia, serif">Member Portal</text>
  <text x="505" y="1174" text-anchor="middle" font-size="10" fill="#86efac">Membership · Payments · Members Library · Update payment method if card expired</text>

  <!-- PHASE 7 -->
  <rect x="16" y="1204" width="828" height="20" rx="3" fill="#f3f4f6"/>
  <text x="430" y="1218" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280" letter-spacing="1.2">PHASE 7 — ONGOING BILLING (NEW SYSTEM)</text>

  <line x1="325" y1="1186" x2="325" y2="1224" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="220" y="1224" width="210" height="62" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="325" y="1245" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Stripe invoice fires</text>
  <text x="325" y="1261" text-anchor="middle" font-size="10" fill="#3b82f6">on billing_cycle_anchor date</text>
  <text x="325" y="1275" text-anchor="middle" font-size="10" fill="#3b82f6">= member's existing renewal date</text>

  <line x1="430" y1="1255" x2="444" y2="1255" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="444" y="1224" width="200" height="62" rx="5" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="544" y="1245" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">invoice.paid webhook</text>
  <text x="544" y="1261" text-anchor="middle" font-size="10" fill="#166534">member status confirmed active</text>
  <text x="544" y="1275" text-anchor="middle" font-size="10" fill="#166534">payment logged in portal</text>

  <!-- Key safeguards -->
  <rect x="16" y="1308" width="828" height="210" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="36" y="1332" font-size="12" font-weight="700" fill="#111827">Key safeguards</text>

  <rect x="30" y="1344" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="46" y="1353" font-size="11" fill="#374151"><tspan font-weight="600">No double-charge:</tspan>  billing_cycle_anchor = existing PMS Pro renewal date. Stripe does not invoice at subscription creation.</text>

  <rect x="30" y="1368" width="8" height="8" rx="2" fill="#dc2626"/>
  <text x="46" y="1377" font-size="11" fill="#374151"><tspan font-weight="600">Strict cutover order:</tspan>  create Stripe sub → verify Supabase sync → THEN cancel in PMS Pro. Never reversed.</text>

  <rect x="30" y="1392" width="8" height="8" rx="2" fill="#166534"/>
  <text x="46" y="1401" font-size="11" fill="#374151"><tspan font-weight="600">Expired cards proceed:</tspan>  subscriptions created regardless — member updates card via Billing Portal on first login.</text>

  <rect x="30" y="1416" width="8" height="8" rx="2" fill="#3b82f6"/>
  <text x="46" y="1425" font-size="11" fill="#374151"><tspan font-weight="600">Live card data only:</tspan>  stripe.paymentMethods.retrieve() called for every row. WordPress card data never used.</text>

  <rect x="30" y="1440" width="8" height="8" rx="2" fill="#6b7280"/>
  <text x="46" y="1449" font-size="11" fill="#374151"><tspan font-weight="600">One-shot run:</tspan>  scripts run once against final seed file. Idempotency keys allow safe retry if run is interrupted.</text>

  <rect x="30" y="1468" width="796" height="36" rx="4" fill="#1b4d2e"/>
  <text x="46" y="1483" font-size="11" font-weight="700" fill="#86efac">Run sequence</text>
  <text x="46" y="1497" font-size="11" fill="#d1fae5" font-family="monospace">create-subscriptions.ts --execute  →  migrate-members.ts  →  create-auth-users.ts --execute</text>

</svg>
